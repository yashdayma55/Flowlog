<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowLog Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 20px;
            color: #58a6ff;
            font-weight: 600;
        }

        header span {
            font-size: 13px;
            color: #8b949e;
        }

        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: calc(100vh - 57px);
        }

        /* LEFT PANEL — trace list */
        .trace-list {
            border-right: 1px solid #30363d;
            overflow-y: auto;
            background: #161b22;
        }

        .trace-list-header {
            padding: 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .trace-list-header h2 {
            font-size: 14px;
            color: #8b949e;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .refresh-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .refresh-btn:hover {
            background: #30363d;
        }

        .filters {
            padding: 12px 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #30363d;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            font-size: 12px;
        }

        .filter-btn.active {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }

        .trace-item {
            padding: 14px 16px;
            border-bottom: 1px solid #21262d;
            cursor: pointer;
            transition: background 0.15s;
        }

        .trace-item:hover {
            background: #1c2128;
        }

        .trace-item.selected {
            background: #1c2128;
            border-left: 3px solid #58a6ff;
        }

        .trace-item-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .trace-id {
            font-size: 13px;
            font-family: monospace;
            color: #58a6ff;
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-badge.SUCCESS {
            background: #1a3a2a;
            color: #3fb950;
        }

        .status-badge.FAILED {
            background: #3a1a1a;
            color: #f85149;
        }

        .trace-item-bottom {
            display: flex;
            gap: 16px;
        }

        .trace-meta {
            font-size: 12px;
            color: #8b949e;
        }

        /* RIGHT PANEL — trace detail */
        .trace-detail {
            overflow-y: auto;
            padding: 24px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8b949e;
            gap: 12px;
        }

        .empty-state .icon {
            font-size: 48px;
        }

        .detail-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #30363d;
        }

        .detail-header h2 {
            font-size: 16px;
            font-family: monospace;
            color: #e1e4e8;
            margin-bottom: 8px;
        }

        .detail-meta {
            display: flex;
            gap: 24px;
        }

        .detail-meta span {
            font-size: 13px;
            color: #8b949e;
        }

        .flow-title {
            font-size: 13px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .span-item {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
            position: relative;
        }

        .span-line {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 24px;
            flex-shrink: 0;
        }

        .span-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 14px;
        }

        .span-dot.SUCCESS { background: #3fb950; }
        .span-dot.FAILED  { background: #f85149; }

        .span-connector {
            width: 2px;
            flex: 1;
            background: #30363d;
            margin-top: 4px;
        }

        .span-card {
            flex: 1;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .span-card:hover {
            border-color: #58a6ff;
        }

        .span-card.expanded {
            border-color: #58a6ff;
        }

        .span-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .span-function {
            font-family: monospace;
            font-size: 14px;
            color: #e1e4e8;
            font-weight: 600;
        }

        .span-duration {
            font-size: 12px;
            color: #8b949e;
        }

        .span-location {
            font-size: 12px;
            color: #8b949e;
            margin-top: 4px;
            font-family: monospace;
        }

        .span-detail {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #30363d;
        }

        .span-detail.visible {
            display: block;
        }

        .detail-row {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .detail-label {
            color: #8b949e;
            width: 120px;
            flex-shrink: 0;
        }

        .detail-value {
            color: #e1e4e8;
            font-family: monospace;
        }

        .error-box {
            margin-top: 12px;
            background: #2d1515;
            border: 1px solid #f85149;
            border-radius: 6px;
            padding: 12px;
        }

        .error-type {
            color: #f85149;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .error-message {
            color: #ffa198;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .error-stack {
            color: #8b949e;
            font-size: 11px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }

        .stats-bar {
            display: flex;
            gap: 24px;
            padding: 12px 16px;
            background: #0d1117;
            border-bottom: 1px solid #30363d;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #e1e4e8;
        }

        .stat-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
        }

        .stat-value.success { color: #3fb950; }
        .stat-value.failed  { color: #f85149; }
    </style>
</head>
<body>

<header>
    <h1>⚡ FlowLog</h1>
    <span id="last-updated">Loading...</span>
</header>

<div id="stats-bar" class="stats-bar">
    <div class="stat">
        <span class="stat-value" id="stat-total">-</span>
        <span class="stat-label">Total Traces</span>
    </div>
    <div class="stat">
        <span class="stat-value success" id="stat-success">-</span>
        <span class="stat-label">Successful</span>
    </div>
    <div class="stat">
        <span class="stat-value failed" id="stat-failed">-</span>
        <span class="stat-label">Failed</span>
    </div>
</div>

<div class="container">
    <!-- LEFT — Trace List -->
    <div class="trace-list">
        <div class="trace-list-header">
            <h2>Traces</h2>
            <button class="refresh-btn" onclick="loadTraces()">↻ Refresh</button>
        </div>
        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('ALL', this)">All</button>
            <button class="filter-btn" onclick="setFilter('SUCCESS', this)">Success</button>
            <button class="filter-btn" onclick="setFilter('FAILED', this)">Failed</button>
        </div>
        <div id="trace-list-content">
            <div class="loading">Loading traces...</div>
        </div>
    </div>

    <!-- RIGHT — Trace Detail -->
    <div class="trace-detail" id="trace-detail">
        <div class="empty-state">
            <span class="icon">🔍</span>
            <p>Select a trace to see the full flow</p>
        </div>
    </div>
</div>

<script>
    const QUERY_API = 'http://localhost:8001';
    let allTraces = [];
    let currentFilter = 'ALL';

    // Load all traces from Query API
    async function loadTraces() {
        try {
            const response = await fetch(`${QUERY_API}/traces?hours=24&limit=100`);
            const data = await response.json();
            allTraces = data.traces;
            renderTraces(allTraces);
            updateStats(allTraces);
            document.getElementById('last-updated').textContent =
                `Last updated: ${new Date().toLocaleTimeString()}`;
        } catch (err) {
            document.getElementById('trace-list-content').innerHTML =
                '<div class="loading">Failed to connect to Query API</div>';
        }
    }

    // Update stats bar
    function updateStats(traces) {
        const total = traces.length;
        const success = traces.filter(t => t.status === 'SUCCESS').length;
        const failed = traces.filter(t => t.status === 'FAILED').length;
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-success').textContent = success;
        document.getElementById('stat-failed').textContent = failed;
    }

    // Render trace list
    function renderTraces(traces) {
        const filtered = currentFilter === 'ALL'
            ? traces
            : traces.filter(t => t.status === currentFilter);

        if (filtered.length === 0) {
            document.getElementById('trace-list-content').innerHTML =
                '<div class="loading">No traces found</div>';
            return;
        }

        document.getElementById('trace-list-content').innerHTML = filtered.map(trace => `
            <div class="trace-item" onclick="loadTraceDetail('${trace.trace_id}', this)">
                <div class="trace-item-top">
                    <span class="trace-id">${trace.trace_id}</span>
                    <span class="status-badge ${trace.status}">${trace.status}</span>
                </div>
                <div class="trace-item-bottom">
                    <span class="trace-meta">📦 ${trace.span_count} spans</span>
                    <span class="trace-meta">🕐 ${formatTime(trace.created_at)}</span>
                    ${trace.total_duration_ms
                        ? `<span class="trace-meta">⚡ ${trace.total_duration_ms}ms</span>`
                        : ''}
                </div>
            </div>
        `).join('');
    }

    // Load and render trace detail
    async function loadTraceDetail(traceId, element) {
        // Highlight selected trace
        document.querySelectorAll('.trace-item').forEach(el =>
            el.classList.remove('selected'));
        element.classList.add('selected');

        document.getElementById('trace-detail').innerHTML =
            '<div class="loading">Loading trace...</div>';

        try {
            const response = await fetch(`${QUERY_API}/traces/${traceId}`);
            const trace = await response.json();
            renderTraceDetail(trace);
        } catch (err) {
            document.getElementById('trace-detail').innerHTML =
                '<div class="loading">Failed to load trace</div>';
        }
    }

    // Render full trace detail with flow
    function renderTraceDetail(trace) {
        const flowHtml = trace.flow.map((span, index) => `
            <div class="span-item">
                <div class="span-line">
                    <div class="span-dot ${span.status}"></div>
                    ${index < trace.flow.length - 1
                        ? '<div class="span-connector"></div>'
                        : ''}
                </div>
                <div class="span-card" onclick="toggleSpanDetail(this)">
                    <div class="span-card-top">
                        <div>
                            <div class="span-function">
                                ${span.span_order}. ${span.function_name}()
                                <span class="status-badge ${span.status}" 
                                      style="margin-left:8px">
                                    ${span.status}
                                </span>
                            </div>
                            <div class="span-location">
                                📄 ${span.file_name || 'unknown'}
                                : line ${span.line_number || '?'}
                            </div>
                        </div>
                        <div class="span-duration">
                            ${span.duration_ms}ms
                        </div>
                    </div>

                    <!-- Expandable detail -->
                    <div class="span-detail">
                        <div class="detail-row">
                            <span class="detail-label">Function</span>
                            <span class="detail-value">${span.function_name}()</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">File</span>
                            <span class="detail-value">${span.file_name}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Line</span>
                            <span class="detail-value">${span.line_number}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Duration</span>
                            <span class="detail-value">${span.duration_ms}ms</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Order</span>
                            <span class="detail-value">#${span.span_order}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Timestamp</span>
                            <span class="detail-value">
                                ${new Date(span.created_at).toLocaleString()}
                            </span>
                        </div>

                        ${span.error ? `
                        <div class="error-box">
                            <div class="error-type">
                                ❌ ${span.error.error_type}
                            </div>
                            <div class="error-message">
                                ${span.error.error_message}
                            </div>
                            <div class="error-stack">
                                ${span.error.stack_trace}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            </div>
        `).join('');

        document.getElementById('trace-detail').innerHTML = `
            <div class="detail-header">
                <h2>${trace.trace_id}</h2>
                <div class="detail-meta">
                    <span>
                        <span class="status-badge ${trace.status}">
                            ${trace.status}
                        </span>
                    </span>
                    <span>📦 ${trace.flow.length} function calls</span>
                    <span>🕐 ${new Date(trace.created_at).toLocaleString()}</span>
                </div>
            </div>
            <div class="flow-title">Function Call Flow</div>
            ${flowHtml}
        `;
    }

    // Toggle span detail on click
    function toggleSpanDetail(card) {
        const detail = card.querySelector('.span-detail');
        detail.classList.toggle('visible');
        card.classList.toggle('expanded');
    }

    // Filter traces
    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b =>
            b.classList.remove('active'));
        btn.classList.add('active');
        renderTraces(allTraces);
    }

    // Format timestamp
    function formatTime(timestamp) {
        const date = new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        if (diffMins < 1) return 'just now';
        if (diffMins < 60) return `${diffMins}m ago`;
        const diffHours = Math.floor(diffMins / 60);
        if (diffHours < 24) return `${diffHours}h ago`;
        return date.toLocaleDateString();
    }

    // Auto refresh every 10 seconds
    loadTraces();
    setInterval(loadTraces, 10000);
</script>
</body>
</html>
